name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npx eslint app.js server/ client/

            - name: Run Stylelint
              run: npx stylelint "client/**/*.{scss,vue}"

            - name: Check Prettier formatting
              run: npm run format:check

    test:
        name: E2E Tests
        runs-on: ubuntu-latest
        services:
            mongodb:
                image: mongo:7.0
                ports:
                    - 27017:27017
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium firefox

            - name: Run E2E tests
              run: npx playwright test
              env:
                  CI: true
                  NODE_CONFIG: '{"databaseUrl":"mongodb://localhost:27017/lighterpack"}'

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7
